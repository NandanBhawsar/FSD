<!DOCTYPE html>
<html>
<head>
  <title>Product Filter Program</title>
</head>
<body>

<h2>Open Console to See Output</h2>

<script>
const productsData = {
  products: [
    { id: 1, name: "Laptop", price: 55000 },
    { id: 2, name: "Smartphone", price: 25000 },
    { id: 3, name: "Headphones", price: 2000 },
    { id: 4, name: "Keyboard", price: 1500 },
    { id: 5, name: "Monitor", price: 12000 }
  ]
};

function displayProducts(products) {
  console.log("Product List:");
  products.forEach(product => {
    console.log("ID:", product.id,
                "Name:", product.name,
                "Price: ₹" + product.price);
  });
}

function filterByMinPrice(products, minPrice) {
  return products.filter(product => product.price >= minPrice);
}

displayProducts(productsData.products);

let userInput = prompt("Enter minimum price to filter products:");
let minPrice = parseFloat(userInput);

if (!isNaN(minPrice)) {
  const filteredProducts = filterByMinPrice(productsData.products, minPrice);

  console.log("\nProducts with price >= ₹" + minPrice + ":");

  if (filteredProducts.length > 0) {
    displayProducts(filteredProducts);
  } else {
    console.log("No products found matching the criteria.");
  }
} else {
  console.log("Invalid price entered.");
}
</script>

</body>
</html>
